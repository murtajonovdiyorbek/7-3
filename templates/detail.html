{% extends "base.html" %}
{% load static %}

{% block content %}


<div class="container py-5">
    <div class="row">

        <div class="col-md-6">
            <img src="{{ product.get_image }}" class="img-fluid">
        </div>

        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h4 class="text-primary">
                ${{ product.price }}
            </h4>

            <p>
                {{ product.description }}
            </p>

            <a href="#" class="btn btn-primary">
                Add To Cart
            </a>

        </div>

    </div>
</div>

{% endblock %}
