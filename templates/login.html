<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electro - Kirish</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

:root{
--primary-color:#ff6600;
}

body{
background:#f8f9fa;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

.login-container{
margin-top:80px;
margin-bottom:80px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card-header{
background:transparent;
border:none;
}

.btn-primary{
background:var(--primary-color);
border:var(--primary-color);
padding:12px;
font-weight:600;
}

.btn-primary:hover{
background:#e65c00;
}

.form-control:focus{
border-color:var(--primary-color);
box-shadow:0 0 0 .25rem rgba(255,102,0,.25);
}

.logo-text{
color:var(--primary-color);
font-weight:700;
font-size:2rem;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container login-container">

<div class="row justify-content-center">

<div class="col-md-6 col-lg-5">

<div class="text-center mb-4">
<a href="{% url 'index' %}" class="logo-text">
<i class="fas fa-shopping-bag me-2"></i>Electro
</a>
</div>

<div class="card p-4">

<div class="card-header text-center">
<h3 class="fw-bold">Tizimga kirish</h3>
<p class="text-muted small">Login va parolni kiriting</p>
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<!-- username -->
<div class="mb-3">
<label class="form-label small">Foydalanuvchi nomi</label>

<div class="input-group">
<span class="input-group-text bg-light">
<i class="fa fa-user text-muted"></i>
</span>

<input type="text"
name="username"
class="form-control"
placeholder="username"
required>
</div>

</div>

<!-- password -->
<div class="mb-4">

<label class="form-label small">Parol</label>

<div class="input-group">
<span class="input-group-text bg-light">
<i class="fa fa-lock text-muted"></i>
</span>

<input type="password"
name="password"
class="form-control"
placeholder="••••••••"
required>
</div>

</div>

<div class="d-grid mb-3">

<button type="submit" class="btn btn-primary rounded-pill">
Kirish
</button>

</div>

<div class="text-center">

<p class="small text-muted">

Akkountingiz yo‘qmi?

<a href="{% url 'register' %}"
class="text-decoration-none fw-bold text-primary">

Ro‘yxatdan o‘tish

</a>

</p>

</div>

</form>

</div>

</div>

<div class="text-center mt-4">

<small class="text-muted">
© 2026 Electro. Barcha huquqlar himoyalangan.
</small>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
